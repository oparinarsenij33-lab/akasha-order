<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Акаша — Хранительница Знаний Ордена Вольных Джедаев</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-firestore-compat.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">📜 Акаша</h1>
            <p class="subtitle">Хранительница Знаний Ордена Вольных Джедаев</p>
            <div id="season-indicator" class="season-indicator">☀️ Лето</div>
        </header>

        <div id="chat-container" class="chat-container">
            <!-- Сообщения будут добавляться здесь -->
        </div>

        <div id="main-input-wrapper" class="main-input-wrapper">
            <textarea 
                id="custom-textarea" 
                class="custom-textarea" 
                placeholder="Задай вопрос Акаше..." 
                rows="3"
                inputmode="none"
            ></textarea>
            
            <div class="toolbar">
                <button id="lang-toggle-btn" class="toolbar-btn lang-btn" onclick="window.toggleLanguage()">RU</button>
                <button class="toolbar-btn send-btn" onclick="handleSend()">Отправить</button>
            </div>
            
            <div id="custom-keyboard" class="custom-keyboard"></div>
        </div>

        <div id="master-chat-wrapper" class="master-chat-wrapper" style="display:none;">
            <div class="chat-header">🔮 Личный чат с Мастером</div>
            <div id="master-chat-container" class="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="master-chat-input" class="chat-input" placeholder="Введите сообщение..." autocapitalize="off" spellcheck="false" inputmode="text">
                <button class="chat-send-btn" onclick="sendMasterChatMessage()">🔮🔮</button>
            </div>
            <button class="hw-btn" onclick="closeMasterChat()" style="width:100%; margin-top:10px;">🔙 Вернуться в меню</button>
        </div>

        <div id="custom-modal" class="custom-modal" style="display:none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-title">Заголовок</h3>
                    <button class="modal-close" onclick="closeCustomModal()">×</button>
                </div>
                <div class="modal-body" id="modal-body"></div>
                <div class="modal-footer" id="modal-footer"></div>
            </div>
        </div>

        <button id="back-button" class="back-button" onclick="showMainMenu()" style="display:none;">🔙 Назад</button>

        <div class="particles">
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
            <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        </div>
    </div>

    <button class="logout-btn" onclick="handleLogout()" style="display:none;">🚪 Выйти</button>

    <script src="script.js"></script>
</body>
</html>
