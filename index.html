<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Акаша — Хранительница Знаний Ордена Вольных Джедаев</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>📜 Акаша</h1>
        <div class="subtitle">Хранительница Знаний Ордена Вольных Джедаев</div>
        <div class="season-indicator" id="season-indicator">☀️ Лето</div>
    </div>

    <div class="chat-container" id="chat-container"></div>

    <div class="master-chat-wrapper" id="master-chat-wrapper">
        <div class="master-chat-container" id="master-chat-container"></div>
        <div class="input-wrapper">
            <textarea class="custom-textarea" id="master-chat-input" placeholder="Напиши сообщение..."></textarea>
            <div class="input-controls">
                <button class="control-btn" onclick="window.closeMasterChat()">🔙 Назад</button>
                <button class="control-btn send-btn" onclick="window.sendMasterChatMessage()">📤 Отправить</button>
            </div>
        </div>
    </div>

    <div class="input-wrapper" id="main-input-wrapper">
        <textarea class="custom-textarea" id="custom-textarea" placeholder="Задай вопрос Акаше..."></textarea>
        <div class="input-controls">
            <button class="control-btn" onclick="window.toggleKeyboardVisibility()">⌨️</button>
            <button class="control-btn" onclick="window.toggleLargeText()">🔍</button>
            <button class="control-btn" id="lang-toggle-btn" onclick="window.toggleLanguage()">RU</button>
            <button class="control-btn send-btn" onclick="handleSend()">Отправить</button>
        </div>
    </div>

    <div class="custom-keyboard" id="custom-keyboard"></div>

    <div class="custom-modal" id="custom-modal">
        <div class="modal-content">
            <h3 id="modal-title" style="color: var(--accent-color); margin-bottom: 15px; font-family: 'Playfair Display', serif;"></h3>
            <div id="modal-body"></div>
            <div id="modal-footer" style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;"></div>
        </div>
    </div>

    <button class="logout-btn hidden" onclick="handleLogout()" style="position: fixed; top: 20px; right: 20px; z-index: 1000; background: rgba(255, 80, 80, 0.3); color: #ff6b6b; border: 1px solid rgba(255, 80, 80, 0.5); padding: 10px 15px; border-radius: 8px; cursor: pointer;">🚪 Выйти</button>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
